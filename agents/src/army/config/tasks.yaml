research_task:
  description: >
    Conduct a thorough research about {topic}
    First, call the `gateway_message` tool with a payload asking for a server message about {topic},
    then use that response as additional context for your research.
    Make sure you find any interesting and relevant information given
    the current year is {current_year}.
  expected_output: >
    A list with 10 bullet points of the most relevant information about {topic}
  agent: researcher

price_prediction_task:
  description: >
    Analyze {commodity} market data and predict probable price movements:
    
    1. Query recent volatility data using: volatility_query(commodity="{commodity}", date="{date}", minutes={minutes})
    
    2. Analyze the data for these historical patterns:
       - **Volatility Expansion**: When vol60 increases significantly (>50% change), prices often move 2-5% in the direction of the trend within 4-8 hours
       - **Panic Spikes**: When short_panic > 2.0, it indicates overselling - historically followed by 60% probability of reversal within 6 hours
       - **Panic Buying**: When long_panic > 2.0, it indicates overbuying - historically followed by 55% probability of pullback within 6 hours
       - **Volatility Compression**: When vol60 drops below 0.015 after being above 0.025, expect a breakout (up or down) within 12 hours with 70% probability
       - **Volume-Volatility Divergence**: High volume with low volatility suggests accumulation; low volume with high volatility suggests distribution
       - **Rolling Window Alignment**: When vol5, vol15, and vol60 all increase together, strong directional move is likely (75% probability)
    
    3. Calculate probability-weighted predictions:
       - Identify which pattern(s) are present
       - Assess pattern strength (how closely data matches historical pattern)
       - Consider multiple patterns and their interactions
       - Provide probability range for price movement (e.g., "60-70% chance of 2-3% increase")
    
    4. Consider current price context:
       - Recent high/low range
       - Current price relative to session open
       - Volume trends
    
    5. Make your prediction with:
       - Direction (UP/DOWN/SIDEWAYS)
       - Magnitude (percentage range)
       - Timeframe (hours)
       - Confidence level (probability percentage)
       - Key supporting factors
       - Key risk factors that could invalidate prediction
    
    Use historical market knowledge: Gold typically shows mean-reversion after panic events,
    tends to spike during geopolitical uncertainty, and often consolidates in Asian trading hours.
  expected_output: >
    A detailed price prediction report including:
    - Current market state summary (price, volatility, panic levels)
    - Identified patterns with historical success rates
    - Primary prediction: Direction, magnitude, timeframe, confidence (e.g., "65% probability of 2-3% upward movement within 6 hours")
    - Alternative scenarios with probabilities
    - Key levels to watch (support/resistance based on recent data)
    - Risk factors that could change the prediction
    - Recommended actions (e.g., "Wait for confirmation above $2,155 before taking long position")
  agent: price_prediction_specialist

reporting_task:
  description: >
    Review the context you got and expand each topic into a full section for a report.
    If needed, call the `gateway_message` tool to request extra server context for unclear sections.
    Make sure the report is detailed and contains any and all relevant information.
  expected_output: >
    A fully fledged report with the main topics, each with a full section of information.
    Formatted as markdown without '```'
  agent: reporting_analyst
