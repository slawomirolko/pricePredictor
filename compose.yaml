services:
  postgres:
    container_name: pricepredictor.postgres
    image: "pgvector/pgvector:pg17"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pricepredictor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  pricepredictor.api:
    container_name: pricepredictor.api
    image: "pricepredictor.api:latest"
    build:
      context: .
      dockerfile: PricePredictor.Api/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=postgres;Port=5432;Database=pricepredictor;User Id=postgres;Password=postgres;
      - GoldNews__EmbeddingDimensions=3072
      - GoldNews__OllamaUrl=http://host.docker.internal:11434
      - GoogleNewsRss__BaseUrl=https://news.google.com/
      - GoogleNewsRss__RssPath=rss/search?q=gold+price+XAUUSD&hl=en-US&gl=US&ceid=US:en
    ports:
      - "5000:5000"
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
