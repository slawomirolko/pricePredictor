services:
  postgres:
    container_name: pricepredictor.postgres
    image: "pgvector/pgvector:pg17"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pricepredictor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  pricepredictor.api:
    container_name: pricepredictor.api
    image: "pricepredictor.api:latest"
    build:
      context: .
      dockerfile: PricePredictor.Api/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - PersistenceDefaultConnection__ConnectionString=Server=postgres;Port=5432;Database=pricepredictor;User Id=postgres;Password=postgres;
      - GoldNews__EmbeddingDimensions=3072
      - GoldNews__LocalOllamaUrl=http://host.docker.internal:11434
      - GoldNews__LocalOllamaModel=phi4:latest
      - GoldNews__CloudOllamaUrl=http://host.docker.internal:11434
      - GoldNews__CloudOllamaModel=gpt-oss:20b-cloud
      - GoldNews__UseCloud=true
      - GoldNews__Headless=true
    ports:
      - "5000:5000"
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  pricepredictor.articlesfinderhostedservice:
    container_name: pricepredictor.articlesfinderhostedservice
    image: "pricepredictor.articlesfinderhostedservice:latest"
    build:
      context: .
      dockerfile: PricePredictor.ArticlesFinderHostedService/Dockerfile
    environment:
      - DOTNET_ENVIRONMENT=Production
      - PersistenceDefaultConnection__ConnectionString=Server=postgres;Port=5432;Database=pricepredictor;User Id=postgres;Password=postgres;
      - GoldNews__EmbeddingDimensions=3072
      - GoldNews__LocalOllamaUrl=http://host.docker.internal:11434
      - GoldNews__LocalOllamaModel=phi4:latest
      - GoldNews__CloudOllamaUrl=http://host.docker.internal:11434
      - GoldNews__CloudOllamaModel=gpt-oss:20b-cloud
      - GoldNews__UseCloud=true
      - GoldNews__Headless=true
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  pricepredictor.financetrackerapp:
    container_name: pricepredictor.financetrackerapp
    image: "pricepredictor.financetrackerapp:latest"
    build:
      context: .
      dockerfile: PricePredictor.FinanceTrackerApp/Dockerfile
    environment:
      - DOTNET_ENVIRONMENT=Production
      - PersistenceDefaultConnection__ConnectionString=Server=postgres;Port=5432;Database=pricepredictor;User Id=postgres;Password=postgres;
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
