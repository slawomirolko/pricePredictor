services:
  postgres:
    container_name: pricepredictor.postgres
    image: "postgres:17-alpine"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pricepredictor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  pricepredicator.app:
    container_name: pricepredicator.app
    image: "pricepredicator.app:latest"
    build:
      context: .
      dockerfile: PricePredicator.App/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=postgres;Port=5432;Database=pricepredictor;User Id=postgres;Password=postgres;
      - GoldNews__QdrantUrl=http://qdrant:6333
      - GoldNews__OllamaUrl=http://host.docker.internal:11434
    ports:
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  qdrant:
    image: "qdrant/qdrant:latest"
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/healthz >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  qdrant_data:
