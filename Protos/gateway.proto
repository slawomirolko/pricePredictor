syntax = "proto3";

option csharp_namespace = "PricePredictor.Api.Gateway";

package gateway;

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

// Main gRPC service
service Gateway {
  rpc GetVolatility (VolatilityQueryRequest) returns (VolatilityQueryReply);
  rpc ExportVolatilityPeriodJson (VolatilityPeriodRequest) returns (JsonPayloadReply);
  rpc ExportLatestVolatilityJson (google.protobuf.Empty) returns (JsonPayloadReply);
  rpc DownloadGoldNewsArticle (DownloadArticleRequest) returns (DownloadArticleReply);
  rpc GetNewestImportantArticles (NewestImportantArticlesRequest) returns (NewestImportantArticlesReply);
  rpc SubscribeLatestNews (LatestNewsSubscriptionRequest) returns (stream LatestNewsNotification);
}

enum Commodity {
  UNSPECIFIED = 0;
  GOLD = 1;
  SILVER = 2;
  NATURAL_GAS = 3;
  OIL = 4;
}

message VolatilityQueryRequest {
  Commodity commodity = 1;
  google.protobuf.Timestamp date = 2;
  int32 minutes = 3;
}

message VolatilityPoint {
  google.protobuf.Timestamp timestamp = 1;
  double open = 2;
  double high = 3;
  double low = 4;
  double close = 5;
  int64 volume = 6;
  double log_return = 7;
  double vol5 = 8;
  double vol15 = 9;
  double vol60 = 10;
  double short_panic = 11;
  double long_panic = 12;
}

message VolatilityQueryReply {
  Commodity commodity = 1;
  repeated VolatilityPoint points = 2;
}

message VolatilityPeriodRequest {
  google.protobuf.Timestamp start_utc = 1;
  google.protobuf.Timestamp end_utc = 2;
}

message JsonPayloadReply {
  string json = 1;
  string content_type = 2;
}

message DownloadArticleRequest {
  string url = 1;
  string title = 2;
}

message DownloadArticleReply {
  bool success = 1;
  string message = 2;
  bool was_already_stored = 3;
  int32 content_length = 4;
}

message NewestImportantArticlesRequest {
}

message ImportantArticle {
  string url = 1;
  string source = 2;
  google.protobuf.Timestamp read_at_utc = 3;
  string summary = 4;
  string article_id = 5;
}

message NewestImportantArticlesReply {
  repeated ImportantArticle articles = 1;
}

message LatestNewsSubscriptionRequest {
  string subscriber = 1;
}

message LatestNewsNotification {
  string title = 1;
  string link = 2;
  google.protobuf.Timestamp published_at_utc = 3;
  string source = 4;
  google.protobuf.Timestamp sent_at_utc = 5;
}
